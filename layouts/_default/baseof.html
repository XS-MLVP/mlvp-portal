<!DOCTYPE html>
<html>
    {{- partial "head.html" . -}}
    <body style="width: 100%; max-width: 100%; margin: 0; padding: 0; {{ if not .IsHome }}background-color: rgb(248, 248, 248);{{ end }}">
        {{- partial "header.html" . -}}
        <div id="content">
            {{ if not .IsHome }}
            <div class="container py-4">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb bg-transparent p-0 m-0 small custom-breadcrumb">
                        {{ range .Ancestors.Reverse }}
                        <li class="breadcrumb-item"><a href="{{ .RelPermalink }}" class="text-decoration-none">{{ .Title }}</a></li>
                        {{ end }}
                        <li class="breadcrumb-item active" aria-current="page">{{ .Title }}</li>
                    </ol>
                </nav>
            </div>
            <style>
                .custom-breadcrumb .breadcrumb-item a, 
                .custom-breadcrumb .breadcrumb-item::before {
                    color: rgba(0, 0, 0, 0.6) !important;
                }
                .custom-breadcrumb .breadcrumb-item.active {
                    color: rgba(0, 0, 0, 1) !important;
                    font-weight: bold;
                }
            </style>
            {{ end }}
            {{- block "main" . }}{{- end }}
        </div>
<!--        {{- partial "footer.html" . -}}-->
        {{- partial "script.html" . -}}
    </body>
</html>
