<!DOCTYPE html>
<html>
<head>
<style>
  .carousel-inner { position: relative; width: 100%; overflow: hidden; }
  .carousel-inner::after { display: block; clear: both; content: ""; }
  .carousel-item { position: relative; display: block; float: left; width: 100%; margin-right: -100%; transition: transform .6s ease-in-out; }
  .intro-container { position: relative; background: red; }
  .intro-container::before { content: ''; display: block; padding-top: 40.5rem; }
  .h-100 { height: 100% !important; }
  .intro-section { background: blue; opacity: 0.5; }
</style>
</head>
<body>
<div class="intro-container">
  <div class="carousel-inner" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;">
    <div class="carousel-item h-100">
      <div class="intro-section h-100">
        <div style="position: relative; top: 27.5rem;">Button</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
